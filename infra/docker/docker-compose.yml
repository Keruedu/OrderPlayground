services:
  mysql:
    image: mysql:8.4
    container_name: order-playground-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:8.0
    container_name: order-playground-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 })' | mongosh mongodb://localhost:27017/admin --quiet"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-postgres:
    image: postgres:16
    container_name: order-playground-temporal-postgres
    environment:
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.0
    container_name: order-playground-temporal
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_SEEDS: temporal-postgres
      ENABLE_ES: "false"
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.38.0
    container_name: order-playground-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: 8080
    ports:
      - "${TEMPORAL_UI_PORT}:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: order-playground-keycloak
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 20

  inventory-service:
    build:
      context: ../..
      dockerfile: apps/inventory-service/Dockerfile
    container_name: order-playground-inventory
    environment:
      GRPC_PORT: ${INVENTORY_GRPC_PORT}
    ports:
      - "${INVENTORY_GRPC_PORT}:${INVENTORY_GRPC_PORT}"

  notifier-service:
    build:
      context: ../..
      dockerfile: apps/notifier-service/Dockerfile
    container_name: order-playground-notifier
    environment:
      GRPC_PORT: ${NOTIFIER_GRPC_PORT}
    ports:
      - "${NOTIFIER_GRPC_PORT}:${NOTIFIER_GRPC_PORT}"

  gateway-api:
    build:
      context: ../..
      dockerfile: apps/gateway-api/Dockerfile
    container_name: order-playground-gateway
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      temporal:
        condition: service_started
      inventory-service:
        condition: service_started
      notifier-service:
        condition: service_started
    environment:
      APP_NAME: gateway-api
      HTTP_PORT: ${GATEWAY_PORT}
      MYSQL_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true
      MYSQL_MAX_OPEN_CONNS: 20
      MYSQL_MAX_IDLE_CONNS: 10
      MYSQL_CONN_MAX_LIFETIME: 30m
      MYSQL_CONN_MAX_IDLE_TIME: 5m
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_MAX_POOL_SIZE: 20
      MONGO_MIN_POOL_SIZE: 5
      MONGO_MAX_IDLE_TIME: 5m
      KEYCLOAK_ISSUER_URL: http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
      KEYCLOAK_JWKS_BASE_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS}
      TEMPORAL_TASK_QUEUE: order-playground
      INVENTORY_GRPC_ADDRESS: inventory-service:${INVENTORY_GRPC_PORT}
      NOTIFIER_GRPC_ADDRESS: notifier-service:${NOTIFIER_GRPC_PORT}
      REQUEST_TIMEOUT: 10s
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"

volumes:
  mysql_data:
  mongo_data:
